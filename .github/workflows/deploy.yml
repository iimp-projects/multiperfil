name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint -- --max-warnings 0

  build-and-deploy:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set Environment Variables
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ENV=prod" >> $GITHUB_ENV
            echo "AWS_ACCESS_KEY_ID_VAL=${{ secrets.PROD_AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
            echo "AWS_SECRET_ACCESS_KEY_VAL=${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
            echo "ECR_REPOSITORY_VAL=${{ secrets.PROD_ECR_REPOSITORY }}" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_API_KEY_VAL=${{ secrets.PROD_NEXT_PUBLIC_API_KEY || vars.PROD_NEXT_PUBLIC_API_KEY }}" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_API_BASE_PATH_VAL=${{ vars.PROD_NEXT_PUBLIC_API_BASE_PATH || secrets.PROD_NEXT_PUBLIC_API_BASE_PATH || '/KBServiciosIIMPJavaEnvironment/rest' }}" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_API_DOMAIN_VAL=${{ vars.PROD_NEXT_PUBLIC_API_DOMAIN || secrets.PROD_NEXT_PUBLIC_API_DOMAIN || 'https://secure2.iimp.org:8443' }}" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_APP_VERSION_VAL=${{ vars.PROD_NEXT_PUBLIC_APP_VERSION || secrets.PROD_NEXT_PUBLIC_APP_VERSION || 'V1' }}" >> $GITHUB_ENV
          else
            echo "ENV=qa" >> $GITHUB_ENV
            echo "AWS_ACCESS_KEY_ID_VAL=${{ secrets.QA_AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
            echo "AWS_SECRET_ACCESS_KEY_VAL=${{ secrets.QA_AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
            echo "ECR_REPOSITORY_VAL=${{ secrets.QA_ECR_REPOSITORY }}" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_API_KEY_VAL=${{ secrets.QA_NEXT_PUBLIC_API_KEY || vars.QA_NEXT_PUBLIC_API_KEY }}" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_API_BASE_PATH_VAL=${{ vars.QA_NEXT_PUBLIC_API_BASE_PATH || secrets.QA_NEXT_PUBLIC_API_BASE_PATH || '/KBServiciosPruebaIIMPJavaEnvironment/rest' }}" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_API_DOMAIN_VAL=${{ vars.QA_NEXT_PUBLIC_API_DOMAIN || secrets.QA_NEXT_PUBLIC_API_DOMAIN || 'https://secure2.iimp.org:8443' }}" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_APP_VERSION_VAL=${{ vars.QA_NEXT_PUBLIC_APP_VERSION || secrets.QA_NEXT_PUBLIC_APP_VERSION || 'V1' }}" >> $GITHUB_ENV
          fi
          echo "AWS_REGION=sa-east-1" >> $GITHUB_ENV
          echo "APP_NAME=multiperfil" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID_VAL }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY_VAL }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_KEY=${{ env.NEXT_PUBLIC_API_KEY_VAL }} \
            --build-arg NEXT_PUBLIC_API_BASE_PATH=${{ env.NEXT_PUBLIC_API_BASE_PATH_VAL }} \
            --build-arg NEXT_PUBLIC_API_DOMAIN=${{ env.NEXT_PUBLIC_API_DOMAIN_VAL }} \
            --build-arg NEXT_PUBLIC_APP_VERSION=${{ env.NEXT_PUBLIC_APP_VERSION_VAL }} \
            -t ${{ env.ECR_REPOSITORY_VAL }}:$IMAGE_TAG .
          docker push ${{ env.ECR_REPOSITORY_VAL }}:$IMAGE_TAG

      - name: Update ECS service
        run: |
          aws ecs update-service --cluster ${{ env.APP_NAME }}-${{ env.ENV }}-ecs-cluster --service ${{ env.APP_NAME }}-${{ env.ENV }}-service --force-new-deployment --region ${{ env.AWS_REGION }}
