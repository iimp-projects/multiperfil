name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint -- --max-warnings 0

  build-and-deploy:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set Environment Variables
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ENV=prod" >> $GITHUB_ENV
            echo "ENV_UPPER=PROD" >> $GITHUB_ENV
            echo "AWS_ACCESS_KEY_ID_VAL=${{ secrets.PROD_AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
            echo "AWS_SECRET_ACCESS_KEY_VAL=${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
            echo "ECR_REPOSITORY_VAL=${{ secrets.PROD_ECR_REPOSITORY }}" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_API_KEY_VAL=${{ secrets.PROD_NEXT_PUBLIC_API_KEY || secrets.PROD_TF_VAR_NEXT_PUBLIC_API_KEY || vars.PROD_NEXT_PUBLIC_API_KEY || secrets.PROD_TF_VAR_next_public_api_key }}" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_API_BASE_PATH_VAL=${{ vars.PROD_NEXT_PUBLIC_API_BASE_PATH || secrets.PROD_NEXT_PUBLIC_API_BASE_PATH || '/KBServiciosIIMPJavaEnvironment/rest' }}" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_API_DOMAIN_VAL=${{ vars.PROD_NEXT_PUBLIC_API_DOMAIN || secrets.PROD_NEXT_PUBLIC_API_DOMAIN || 'https://secure2.iimp.org:8443' }}" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_APP_VERSION_VAL=${{ vars.PROD_NEXT_PUBLIC_APP_VERSION || secrets.PROD_NEXT_PUBLIC_APP_VERSION || 'V1' }}" >> $GITHUB_ENV
          else
            echo "ENV=qa" >> $GITHUB_ENV
            echo "ENV_UPPER=QA" >> $GITHUB_ENV
            echo "AWS_ACCESS_KEY_ID_VAL=${{ secrets.QA_AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
            echo "AWS_SECRET_ACCESS_KEY_VAL=${{ secrets.QA_AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
            echo "ECR_REPOSITORY_VAL=${{ secrets.QA_ECR_REPOSITORY }}" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_API_KEY_VAL=${{ secrets.QA_NEXT_PUBLIC_API_KEY || secrets.QA_TF_VAR_NEXT_PUBLIC_API_KEY || vars.QA_NEXT_PUBLIC_API_KEY || secrets.QA_TF_VAR_next_public_api_key }}" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_API_BASE_PATH_VAL=${{ vars.QA_NEXT_PUBLIC_API_BASE_PATH || secrets.QA_NEXT_PUBLIC_API_BASE_PATH || '/KBServiciosPruebaIIMPJavaEnvironment/rest' }}" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_API_DOMAIN_VAL=${{ vars.QA_NEXT_PUBLIC_API_DOMAIN || secrets.QA_NEXT_PUBLIC_API_DOMAIN || 'https://secure2.iimp.org:8443' }}" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_APP_VERSION_VAL=${{ vars.QA_NEXT_PUBLIC_APP_VERSION || secrets.QA_NEXT_PUBLIC_APP_VERSION || 'V1' }}" >> $GITHUB_ENV
          fi
          echo "AWS_REGION=sa-east-1" >> $GITHUB_ENV
          echo "APP_NAME=multiperfil" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID_VAL }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY_VAL }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      - name: Verify SMTP Secrets
        run: |
          if [ -z "${{ secrets.PROD_TF_VAR_SMTP_PASS || secrets.PROD_TF_VAR_smtp_pass || secrets.SMTP_PASS || secrets.smtp_pass || secrets.PROD_SMTP_PASS }}" ]; then
            echo "❌ ERROR: SMTP_PASS is NOT found in GitHub Secrets!"
          else
            echo "✅ SUCCESS: SMTP_PASS is defined."
          fi
          if [ -z "${{ secrets.PROD_TF_VAR_SMTP_USER || secrets.PROD_TF_VAR_smtp_user || secrets.SMTP_USER || secrets.smtp_user || secrets.PROD_SMTP_USER }}" ]; then
            echo "❌ ERROR: SMTP_USER is NOT found in GitHub Secrets!"
          else
            echo "✅ SUCCESS: SMTP_USER is defined."
          fi

      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_smtp_pass: ${{ secrets.PROD_TF_VAR_SMTP_PASS || secrets.PROD_TF_VAR_smtp_pass || secrets.SMTP_PASS || secrets.smtp_pass || secrets.PROD_SMTP_PASS }}
          TF_VAR_smtp_user: ${{ secrets.PROD_TF_VAR_SMTP_USER || secrets.PROD_TF_VAR_smtp_user || secrets.SMTP_USER || secrets.smtp_user || secrets.PROD_SMTP_USER }}
          TF_VAR_smtp_host: ${{ secrets.PROD_TF_VAR_SMTP_HOST || secrets.PROD_TF_VAR_smtp_host || secrets.SMTP_HOST || secrets.smtp_host || 'smtp-relay.sendinblue.com' }}
          TF_VAR_smtp_port: ${{ secrets.PROD_TF_VAR_SMTP_PORT || secrets.PROD_TF_VAR_smtp_port || secrets.SMTP_PORT || secrets.smtp_port || '587' }}
          TF_VAR_smtp_from: ${{ secrets.PROD_TF_VAR_SMTP_FROM || secrets.PROD_TF_VAR_smtp_from || secrets.SMTP_FROM || secrets.smtp_from || 'postmast@iimp.org.pe' }}
          TF_VAR_db_user: ${{ env.ENV == 'prod' && secrets.PROD_DB_USER || secrets.QA_DB_USER || 'multiuser' }}
          TF_VAR_db_pass: ${{ env.ENV == 'prod' && secrets.PROD_DB_PASS || secrets.QA_DB_PASS || 'multiperfil2026' }}
          TF_VAR_next_public_api_key: ${{ env.NEXT_PUBLIC_API_KEY_VAL }}
          TF_VAR_main_domain: ${{ vars.MAIN_DOMAIN || 'sistemasiimp.org.pe' }}
          TF_VAR_subdomain_prefix: ${{ vars.SUBDOMAIN_PREFIX || 'multiperfil' }}
        run: |
          terraform init
          terraform workspace select ${{ env.ENV }} || terraform workspace new ${{ env.ENV }}
          terraform apply -auto-approve -input=false -lock=false

      - name: Validate Build Config
        run: |
          set -euo pipefail
          required=(
            AWS_ACCESS_KEY_ID_VAL
            AWS_SECRET_ACCESS_KEY_VAL
            ECR_REPOSITORY_VAL
            NEXT_PUBLIC_API_KEY_VAL
            NEXT_PUBLIC_API_BASE_PATH_VAL
            NEXT_PUBLIC_API_DOMAIN_VAL
            NEXT_PUBLIC_APP_VERSION_VAL
          )

          for v in "${required[@]}"; do
            if [ -z "${!v:-}" ]; then
              echo "::error::Missing required environment variable: $v"
              exit 1
            fi
          done

      - name: Verify SMTP Secrets (Presence only)
        run: |
          echo "Checking SMTP secrets detection..."
          if [ -n "${{ secrets.PROD_TF_VAR_SMTP_USER || secrets.SMTP_USER || secrets.PROD_SMTP_USER }}" ]; then echo "✅ SMTP_USER: Found"; else echo "❌ SMTP_USER: Missing"; fi
          if [ -n "${{ secrets.PROD_TF_VAR_SMTP_PASS || secrets.SMTP_PASS || secrets.PROD_SMTP_PASS }}" ]; then echo "✅ SMTP_PASS: Found"; else echo "❌ SMTP_PASS: Missing"; fi

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_KEY=${{ env.NEXT_PUBLIC_API_KEY_VAL }} \
            --build-arg NEXT_PUBLIC_API_BASE_PATH=${{ env.NEXT_PUBLIC_API_BASE_PATH_VAL }} \
            --build-arg NEXT_PUBLIC_API_DOMAIN=${{ env.NEXT_PUBLIC_API_DOMAIN_VAL }} \
            --build-arg NEXT_PUBLIC_APP_VERSION=${{ env.NEXT_PUBLIC_APP_VERSION_VAL }} \
            -t ${{ env.ECR_REPOSITORY_VAL }}:$IMAGE_TAG .
          docker push ${{ env.ECR_REPOSITORY_VAL }}:$IMAGE_TAG

      - name: Update ECS service
        run: |
          aws ecs update-service --cluster ${{ env.APP_NAME }}-${{ env.ENV }}-ecs-cluster --service ${{ env.APP_NAME }}-${{ env.ENV }}-service --force-new-deployment --region ${{ env.AWS_REGION }}
